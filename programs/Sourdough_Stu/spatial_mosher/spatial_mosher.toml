[program]
program_id = "com.lzxindustries.spatial_mosher"
program_name = "Spatial Mosher"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"
author = "LZX Industries"
license = "GPL-3.0"
categories = ["Glitch", "Feedback", "Color", "Geometry"]
program_type = "processing"
description = "Circuit-bent geometry and datamoshing emulator."

[[parameter]]
parameter_id = "rotary_potentiometer_1"
control_mode = "linear"
name_label = "Scramble"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_2"
control_mode = "linear"
name_label = "Feedback"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_3"
control_mode = "linear"
name_label = "Grid Size"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_4"
control_mode = "linear"
name_label = "Grid Mod"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_5"
control_mode = "linear"
name_label = "Chaos"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_6"
control_mode = "linear"
name_label = "Balance"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Scramble Target"
value_labels = ["UV", "Y"]

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Chaos Gate"
value_labels = ["Bright Areas", "Free Run"]

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Polarity"
value_labels = ["Look Behind", "Look Ahead"]

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Interleave"
value_labels = ["Even Lines Only", "All Lines"]

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Filter Mode"
value_labels = ["Soft Tears", "Hard Tears"]

[[parameter]]
parameter_id = "linear_potentiometer_12"
control_mode = "linear"
name_label = "Master Mix"
min_value = 0
max_value = 1023
initial_value = 1023

# ---------------------------------------------------------------------------
# Factory presets — selected from a 54-render simulation matrix (2026-04-25).
# Default load state = Clean (everything at 0, Master fully wet): a user must
# turn one control to hear one thing. Other presets each own a distinct
# aesthetic family — block-tear, chroma-chaos, or luma-targeted scramble.
# ---------------------------------------------------------------------------

