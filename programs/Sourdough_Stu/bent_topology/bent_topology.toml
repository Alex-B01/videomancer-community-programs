[program]
program_id = "com.lzxindustries.bent_topology"
program_name = "Bent Topology"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"
author = "Alex Ball"
license = "GPL-3.0"
categories = ["Glitch", "Feedback", "Synthesis", "Color"]
program_type = "processing"
description = "Multi-stage circuit-bent glitch suite. Luma-displaced grid, directional smear, analog ringing, and colour starvation compound through scanline feedback."

[[parameter]]
parameter_id = "rotary_potentiometer_1"
control_mode = "linear"
name_label = "Warp Depth"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_2"
control_mode = "linear"
name_label = "Warp Freq"
min_value = 0
max_value = 1023
initial_value = 256

[[parameter]]
parameter_id = "rotary_potentiometer_3"
control_mode = "linear"
name_label = "Smear Decay"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_4"
control_mode = "linear"
name_label = "Ring Amp"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_5"
control_mode = "linear"
name_label = "Color Crush"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "rotary_potentiometer_6"
control_mode = "linear"
name_label = "Chaos"
min_value = 0
max_value = 1023
initial_value = 0

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Warp Axis"
value_labels = ["H Lines", "V Lines"]

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Smear Dir"
value_labels = ["Horizontal", "Vertical"]

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Ring Pol"
